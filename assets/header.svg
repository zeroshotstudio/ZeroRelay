<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="900" height="220" rx="12" fill="url(#bg)" />
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff">
    <line x1="0" y1="44" x2="900" y2="44"/><line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/><line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="100" y1="0" x2="100" y2="220"/><line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/><line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="500" y1="0" x2="500" y2="220"/><line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/><line x1="800" y1="0" x2="800" y2="220"/>
  </g>
  <!-- Connection lines (relay pattern) -->
  <g stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 150 110 Q 300 60 450 110" />
    <path d="M 150 110 Q 300 160 450 110" />
    <path d="M 450 110 Q 600 60 750 110" />
    <path d="M 450 110 Q 600 160 750 110" />
  </g>
  <!-- Nodes -->
  <g>
    <!-- Left nodes (chat) -->
    <circle cx="150" cy="80" r="6" fill="#22d3ee" opacity="0.8"/>
    <circle cx="150" cy="110" r="6" fill="#22d3ee" opacity="0.8"/>
    <circle cx="150" cy="140" r="6" fill="#22d3ee" opacity="0.8"/>
    <!-- Center node (relay) -->
    <circle cx="450" cy="110" r="12" fill="url(#accent)" />
    <circle cx="450" cy="110" r="18" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Right nodes (AI) -->
    <circle cx="750" cy="70" r="6" fill="#a78bfa" opacity="0.8"/>
    <circle cx="750" cy="100" r="6" fill="#a78bfa" opacity="0.8"/>
    <circle cx="750" cy="130" r="6" fill="#a78bfa" opacity="0.8"/>
    <circle cx="750" cy="160" r="6" fill="#a78bfa" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="450" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8" letter-spacing="4">ZEROSHOT STUDIO</text>
  <text x="450" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#accent)">ZeroRelay</text>
  <text x="450" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Multi-agent AI relay chat</text>
  <!-- Labels -->
  <text x="150" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee" opacity="0.7">chat bridges</text>
  <text x="750" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" opacity="0.7">ai bridges</text>
</svg>
